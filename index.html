<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANZ Zoho Lead Distribution</title>
  <meta name="description" content="Monthly lead distribution tracker for the ANZ Zoho sales team." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="head-main">
      <h1>ANZ Zoho lead distribution</h1>
      <p class="subtitle" id="subtitle">Tracking …</p>
    </div>
    <div class="head-right">
      <span class="grand-total" id="grandTotal">0 total leads</span>
      <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme">
        <i class="ti ti-moon"></i>
      </button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="tracker">Tracker</button>
    <button class="tab" data-tab="history">History</button>
  </nav>

  <main class="container">
    <!-- TRACKER -->
    <section id="panel-tracker" class="panel active">
      <div class="close-bar">
        <span id="closeBarText">Ready to close this month? Snapshot this month and reset all counters.</span>
        <button class="btn btn-primary" id="closeMonthBtn">Close month</button>
      </div>
      <div id="sections"></div>
    </section>

    <!-- HISTORY -->
    <section id="panel-history" class="panel">
      <div class="history-toolbar">
        <span id="historyCount">0 months recorded</span>
        <button class="btn" id="exportCsvBtn" hidden>
          <i class="ti ti-download"></i> Export CSV
        </button>
      </div>

      <div id="exportPanel" class="export-panel" hidden>
        <p class="muted">Copy the text below and paste into a .csv file, or open it directly in Excel / Sheets.</p>
        <textarea id="csvText" readonly rows="8"></textarea>
        <div class="export-actions">
          <button class="btn btn-primary" id="copyCsvBtn"><i class="ti ti-copy"></i> Copy to clipboard</button>
          <span class="copied" id="copiedMsg" hidden>Copied!</span>
          <button class="btn" id="dismissCsvBtn">Dismiss</button>
        </div>
      </div>

      <div id="historyRecords"></div>
    </section>
  </main>

  <div id="modalRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
